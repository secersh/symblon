services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: symblon-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingestor
    container_name: symblon-ingestor
    ports:
      - "8080:8080"
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  paquetier:
    build:
      context: .
      dockerfile: Dockerfile
      target: paquetier
    container_name: symblon-paquetier
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX:-events}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy

  overseer:
    build:
      context: .
      dockerfile: Dockerfile
      target: overseer
    container_name: symblon-overseer
    ports:
      - "8081:8081"
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

