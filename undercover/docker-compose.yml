services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: symblon-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingestor
    container_name: symblon-ingestor
    ports:
      - "8080:8080"
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  paquetier:
    build:
      context: .
      dockerfile: Dockerfile
      target: paquetier
    container_name: symblon-paquetier
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
      DATA_DIR: /data
    volumes:
      - parquet_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Cloudflare Tunnel — opt-in for local development.
  # Exposes the ingestor over the internet so that real GitHub webhooks can
  # reach a local stack without port-forwarding.
  #
  # Usage:
  #   docker compose --profile tunnel up --build
  #
  # Two modes (selected automatically at startup):
  #   1. Quick tunnel (default, no credentials required):
  #      Cloudflare assigns a temporary *.trycloudflare.com URL.
  #      The URL is printed in the cloudflared service logs.
  #
  #   2. Named tunnel (persistent URL, requires Cloudflare account):
  #      Set CLOUDFLARE_TUNNEL_TOKEN in a .env file or your shell, then
  #      docker compose --profile tunnel up --build
  #      See .env.example for details.
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: symblon-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n \"$$CLOUDFLARE_TUNNEL_TOKEN\" ]; then
          cloudflared tunnel --no-autoupdate run --token $$CLOUDFLARE_TUNNEL_TOKEN;
        else
          cloudflared tunnel --no-autoupdate --url http://ingestor:8080;
        fi
      "
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - ingestor

volumes:
  parquet_data:
